# XGBoost Model Configuration
model:
  name: "MLOpsDemoModel"
  version: "1.0.0"

hyperparameters:
  n_estimators: 500
  max_depth: 5
  learning_rate: 0.03
  subsample: 0.85
  colsample_bytree: 0.75
  min_child_weight: 5
  gamma: 0.05
  reg_alpha: 0.05
  reg_lambda: 1.2
  objective: "reg:squarederror"
  eval_metric: ["rmse", "mae"]
  random_state: 42
  tree_method: "hist"

data:
  test_size: 0.2
  val_size: 0.1
  random_state: 42
  target_column: "MedHouseVal"

mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "california-housing-xgboost"
  model_name: "MLOpsDemoModel"
  artifact_path: "xgboost_model"
  registered_model_tags:
    framework: "xgboost"
    dataset: "california_housing"
    task: "regression"

training:
  early_stopping_rounds: 20
  verbose_eval: 100
  log_feature_importance: true
  cross_validate: true
  cv_folds: 5

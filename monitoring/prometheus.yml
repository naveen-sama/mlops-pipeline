# Prometheus scrape configuration for the MLOps pipeline stack
# Reference: https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate alerting rules
  scrape_timeout:      10s

  # Attach these labels to any time series or alert when communicating with
  # external systems (federation, remote storage, Alertmanager).
  external_labels:
    environment: "production"
    project:     "mlops-pipeline"

# ── Alertmanager configuration ────────────────────────────────────────────────
# Uncomment and configure when Alertmanager is deployed.
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

# ── Rule files ────────────────────────────────────────────────────────────────
# rule_files:
#   - "alerts/model_alerts.yml"

# ── Scrape configurations ──────────────────────────────────────────────────────
scrape_configs:

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # ── FastAPI model serving (prometheus-fastapi-instrumentator) ───────────────
  - job_name: "mlops-api"
    scrape_interval: 10s
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "model-serving"
          model:   "MLOpsDemoModel"
    # Relabel to keep only useful metrics
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "http_request_duration_seconds.*|http_requests_total|http_response_size_bytes.*|python_gc.*|process_.*"
        action: keep

  # ── MLflow tracking server ──────────────────────────────────────────────────
  - job_name: "mlflow"
    scrape_interval: 30s
    metrics_path: "/metrics"
    static_configs:
      - targets: ["mlflow:5000"]
        labels:
          service: "mlflow-tracking"

  # ── Node / host metrics (optional — requires node_exporter sidecar) ─────────
  # - job_name: "node"
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
  #       labels:
  #         service: "host-metrics"
